name: Build for NanoPi R2S

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version'
        required: true
        default: '23.05.5'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_env: [
          {
            tag: "23.05.5",
            pkgarch: "aarch64_generic",
            target: "rockchip",
            subtarget: "armv8",
            vermagic: "5.15.167"
          }
        ]
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        env:
          cache-name: "cache-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}"
        with:
          path: openwrt-sdk-*/
          key: ${{ runner.os }}-sdk-${{ env.cache-name }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Building for ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
          
          # Скачиваем SDK для rockchip/armv8
          SDK_FILE=$(curl -s "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "SDK file not found"
            exit 1
          fi
          
          wget "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/${SDK_FILE}"
          
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          
          rm "$SDK_FILE"

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          WORKSPACE_DIR=$(pwd)
          
          cd "$SDK_DIR"
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          cp -r "$WORKSPACE_DIR/kmod-amneziawg" package/
          cp -r "$WORKSPACE_DIR/amneziawg-tools" package/
          cp -r "$WORKSPACE_DIR/luci-proto-amneziawg" package/
          
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          
          make package/kmod-amneziawg/{download,prepare,compile} V=s || true
          make package/luci-proto-amneziawg/{download,prepare,compile} V=s
          make package/amneziawg-tools/{download,prepare,compile} V=s

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          
          mkdir -p awgrelease
          postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
          
          find "$SDK_DIR/bin/packages" -name "amneziawg-tools*.?pk" -exec cp {} "awgrelease/amneziawg-tools_${postfix}.${file##*.}" \;
          find "$SDK_DIR/bin/packages" -name "luci-proto-amneziawg*.?pk" -exec cp {} "awgrelease/luci-proto-amneziawg_${postfix}.${file##*.}" \;
          find "$SDK_DIR/bin/packages" -name "luci-i18n-amneziawg-ru*.?pk" -exec cp {} "awgrelease/luci-i18n-amneziawg-ru_${postfix}.${file##*.}" \;
          find "$SDK_DIR/bin/targets" -name "kmod-amneziawg*.?pk" -exec cp {} "awgrelease/kmod-amneziawg_${postfix}.${file##*.}" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}
          path: awgrelease/
