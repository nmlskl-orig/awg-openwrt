name: Build for NanoPi R2S

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version'
        required: true
        default: '23.05.5'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_env: [
          {
            tag: "23.05.5",
            pkgarch: "aarch64_generic",
            target: "rockchip",
            subtarget: "armv8",
            vermagic: "5.15.167-1-0919bf77bd78281b8293e21504faecfb"
          }
        ]
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools tree

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        env:
          cache-name: "cache-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}"
        with:
          path: openwrt-sdk-*/
          key: ${{ runner.os }}-sdk-${{ env.cache-name }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Building for ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
          
          # Скачиваем SDK для rockchip/armv8
          SDK_FILE=$(curl -s "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "SDK file not found"
            exit 1
          fi
          
          echo "Found SDK: $SDK_FILE"
          wget "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/${SDK_FILE}"
          
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          
          rm "$SDK_FILE"
          
          # Показываем содержимое после распаковки
          echo "SDK extracted:"
          ls -la openwrt-sdk-*/

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          echo "SDK_DIR: $SDK_DIR"
          WORKSPACE_DIR=$(pwd)
          
          cd "$SDK_DIR"
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          cp -r "$WORKSPACE_DIR/kmod-amneziawg" package/
          cp -r "$WORKSPACE_DIR/amneziawg-tools" package/
          cp -r "$WORKSPACE_DIR/luci-proto-amneziawg" package/
          
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          
          echo "Starting build in: $(pwd)"
          
          # Сначала покажем структуру package/
          echo "Package directory contents:"
          ls -la package/
          
          make package/kmod-amneziawg/{download,prepare,compile} V=s || true
          make package/luci-proto-amneziawg/{download,prepare,compile} V=s
          make package/amneziawg-tools/{download,prepare,compile} V=s
          
          # После сборки покажем где искать пакеты
          echo "Looking for built packages..."
          echo "In bin/packages/:"
          find bin/packages -name "*.ipk" -o -name "*.apk" 2>/dev/null || echo "No packages in bin/packages"
          
          echo "In bin/targets/:"
          find bin/targets -name "*.ipk" -o -name "*.apk" 2>/dev/null || echo "No packages in bin/targets"
          
          # Полный поиск всех пакетов
          echo "Full search for packages:"
          find . -name "*.ipk" -o -name "*.apk" 2>/dev/null | grep -E "(amneziawg|luci)" || echo "No packages found at all"

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          echo "SDK_DIR for artifacts: $SDK_DIR"
          
          mkdir -p awgrelease
          postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
          echo "Postfix: $postfix"
          
          # Поиск и копирование с подробным выводом
          echo "Searching for amneziawg-tools..."
          find "$SDK_DIR" -name "amneziawg-tools*.ipk" -o -name "amneziawg-tools*.apk" 2>/dev/null | while read file; do
            echo "Found: $file"
            ext="${file##*.}"
            cp "$file" "awgrelease/amneziawg-tools_${postfix}.${ext}"
          done
          
          echo "Searching for luci-proto-amneziawg..."
          find "$SDK_DIR" -name "luci-proto-amneziawg*.ipk" -o -name "luci-proto-amneziawg*.apk" 2>/dev/null | while read file; do
            echo "Found: $file"
            ext="${file##*.}"
            cp "$file" "awgrelease/luci-proto-amneziawg_${postfix}.${ext}"
          done
          
          echo "Searching for luci-i18n-amneziawg-ru..."
          find "$SDK_DIR" -name "luci-i18n-amneziawg-ru*.ipk" -o -name "luci-i18n-amneziawg-ru*.apk" 2>/dev/null | while read file; do
            echo "Found: $file"
            ext="${file##*.}"
            cp "$file" "awgrelease/luci-i18n-amneziawg-ru_${postfix}.${ext}"
          done
          
          echo "Searching for kmod-amneziawg..."
          find "$SDK_DIR" -name "kmod-amneziawg*.ipk" -o -name "kmod-amneziawg*.apk" 2>/dev/null | while read file; do
            echo "Found: $file"
            ext="${file##*.}"
            cp "$file" "awgrelease/kmod-amneziawg_${postfix}.${ext}"
          done
          
          # Покажем что получилось
          echo "Final awgrelease directory contents:"
          ls -la awgrelease/ || echo "awgrelease is empty!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}
          path: awgrelease/
          if-no-files-found: warn